<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault — Личное хранилище</title>
<meta name="description" content="Безопасное и стильное личное зашифрованное хранилище для ваших паролей, карт и документов.">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
<meta name="theme-color" content="#6366f1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vault">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* ── Reset & Base ──────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:         #0b0b18;
  --glass:      rgba(255,255,255,0.07);
  --glass-2:    rgba(255,255,255,0.04);
  --border:     rgba(255,255,255,0.10);
  --border-hi:  rgba(255,255,255,0.20);
  --text:       #f0f0ff;
  --text-2:     rgba(240,240,255,0.5);
  --text-3:     rgba(240,240,255,0.28);
  --accent:     #6366f1;
  --accent-2:   #8b5cf6;
  --danger:     #ef4444;
  --success:    #22c55e;
  --r:          8px;   /* universal border-radius */
  --r-lg:       10px;
  --shadow:     0 16px 48px rgba(0,0,0,0.45);
  --shadow-sm:  0 4px 16px rgba(0,0,0,0.3);
  --tab-h:      62px;
}
html, body { height: 100%; }
body {
  font-family: 'Figtree', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Background Orbs ───────────────────────────────────────── */
.bg-orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
.orb1 { width:700px;height:700px;top:-250px;right:-200px; background:radial-gradient(circle,rgba(99,102,241,.25),transparent 70%); }
.orb2 { width:600px;height:600px;bottom:-200px;left:-150px; background:radial-gradient(circle,rgba(236,72,153,.18),transparent 70%); }
.orb3 { width:400px;height:400px;top:40%;left:40%; background:radial-gradient(circle,rgba(139,92,246,.12),transparent 70%); }

/* ── Screens ───────────────────────────────────────────────── */
.screen { position: relative; z-index: 1; }
.hidden { display: none !important; }

/* ── Login Screen ──────────────────────────────────────────── */
#login-screen {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.login-card {
  width: 100%; max-width: 420px;
  border-radius: var(--r-lg);
  padding: 48px 40px;
  box-shadow: var(--shadow);
  background: rgba(255,255,255,.06);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1px solid var(--border);
  animation: fadeUp .5s ease both;
}
.login-logo {
  width: 68px; height: 68px;
  margin-bottom: 18px; display: block;
  filter: drop-shadow(0 0 20px rgba(99,102,241,.5));
  object-fit: contain;
}
.login-card h1 { font-size: 28px; font-weight: 800; letter-spacing: -.4px; }
.login-card .sub { color: var(--text-2); font-size: 14px; margin-top: 5px; margin-bottom: 28px; }
.form-group { margin-bottom: 13px; }
.form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 7px; }
.form-group input {
  width: 100%; background: rgba(255,255,255,.05); border: 1px solid var(--border);
  border-radius: var(--r); padding: 12px 15px;
  color: var(--text); font-family: 'Figtree', sans-serif; font-size: 15px; outline: none;
  transition: border-color .2s, background .2s;
}
.form-group input:focus { border-color: rgba(99,102,241,.6); background: rgba(255,255,255,.08); }
.form-group input::placeholder { color: var(--text-3); }
.error-msg {
  background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3);
  border-radius: var(--r); padding: 11px 15px;
  color: #fca5a5; font-size: 13px; margin-bottom: 13px;
}

/* ── Buttons ───────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  border: none; cursor: pointer;
  font-family: 'Figtree', sans-serif; font-weight: 600;
  border-radius: var(--r);
  transition: transform .15s, box-shadow .15s, opacity .15s;
  white-space: nowrap;
}
.btn:active { transform: scale(.97); }
.btn-primary {
  padding: 12px 22px; font-size: 15px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: #fff; box-shadow: 0 6px 24px rgba(99,102,241,.4);
}
.btn-primary:hover { box-shadow: 0 10px 32px rgba(99,102,241,.55); transform: translateY(-1px); }
.btn-full { width: 100%; justify-content: center; margin-top: 8px; }
.btn-ghost {
  padding: 9px 15px; font-size: 13px;
  background: rgba(255,255,255,.07); border: 1px solid var(--border);
  color: var(--text-2);
}
.btn-ghost:hover { background: rgba(255,255,255,.11); color: var(--text); }
.btn-sm { padding: 8px 14px; font-size: 13px; }
.btn-danger { background: rgba(239,68,68,.13); border: 1px solid rgba(239,68,68,.25); color: #fca5a5; }
.btn-danger:hover { background: rgba(239,68,68,.22); }
.btn-icon {
  width: 32px; height: 32px; padding: 0;
  display: inline-flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,.06); border: 1px solid var(--border);
  color: var(--text-2); border-radius: var(--r); font-size: 13px; flex-shrink: 0;
}
.btn-icon:hover { background: rgba(255,255,255,.12); color: var(--text); }
.btn-icon.copied { background: rgba(34,197,94,.15); border-color: rgba(34,197,94,.3); color: #86efac; }
.btn-icon svg { width: 14px; height: 14px; }

/* ── Search Bar ────────────────────────────────────────────── */
.vault-search-bar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: rgba(11,11,24,.88);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.search-wrap { flex: 1; position: relative; }
.search-wrap svg {
  position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  width: 15px; height: 15px; color: var(--text-3); pointer-events: none;
}
.search-wrap input {
  width: 100%; background: rgba(255,255,255,.06); border: 1px solid var(--border);
  border-radius: var(--r); padding: 9px 13px 9px 34px;
  color: var(--text); font-family: 'Figtree', sans-serif; font-size: 14px; outline: none;
  transition: border-color .2s, background .2s;
}
.search-wrap input:focus { border-color: rgba(99,102,241,.5); background: rgba(255,255,255,.09); }
.search-wrap input::placeholder { color: var(--text-3); }
.btn-logout {
  width: 36px; height: 36px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--border); border-radius: var(--r);
  background: rgba(255,255,255,.05); color: var(--text-2);
  cursor: pointer; transition: background .2s, color .2s, border-color .2s;
}
.btn-logout:hover { background: rgba(239,68,68,.14); color: #fca5a5; border-color: rgba(239,68,68,.3); }
.btn-logout svg { width: 15px; height: 15px; }

/* ── Desktop Section Tabs ─────────────────────────────────── */
.section-tabs {
  display: flex; gap: 2px;
  padding: 10px 14px 0;
  border-bottom: 1px solid var(--border);
  background: rgba(11,11,24,.6);
}
.section-tab {
  display: flex; align-items: center; gap: 7px;
  padding: 9px 16px 10px;
  border: none; border-radius: var(--r) var(--r) 0 0;
  background: transparent; color: var(--text-2);
  font-family: 'Figtree', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all .18s;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
}
.section-tab svg { width: 15px; height: 15px; }
.section-tab:hover { color: var(--text); background: rgba(255,255,255,.04); }
.section-tab.active { color: var(--text); border-bottom-color: var(--accent); background: rgba(99,102,241,.07); }

/* ── Main Content ──────────────────────────────────────────── */
#vault-screen { min-height: 100vh; display: flex; flex-direction: column; }
.vault-content {
  flex: 1; position: relative; z-index: 1;
  padding-bottom: calc(var(--tab-h) + 20px);
}

/* ── Cards Grid ────────────────────────────────────────────── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px; padding: 14px;
}
@media (min-width: 768px) { .cards-grid { grid-template-columns: repeat(3, 1fr); gap: 14px; padding: 16px; } }
@media (min-width: 1100px) { .cards-grid { grid-template-columns: repeat(4, 1fr); } }

/* ── Items List (docs / passwords / notes) ─────────────────── */
.items-list {
  display: flex; flex-direction: column;
  padding: 10px 10px; gap: 1px;
}
@media (min-width: 640px) { .items-list { padding: 12px 16px; max-width: 700px; } }

.list-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 12px;
  border-radius: var(--r); cursor: pointer;
  transition: background .15s;
  animation: fadeUp .28s ease both;
}
.list-item:hover { background: rgba(255,255,255,.05); }
.list-icon {
  width: 36px; height: 36px; border-radius: var(--r);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.list-icon svg { width: 17px; height: 17px; }
.list-icon.type-document { background: rgba(59,130,246,.14); color: #60a5fa; }
.list-icon.type-login    { background: rgba(99,102,241,.14); color: #a5b4fc; }
.list-icon.type-note     { background: rgba(251,191,36,.11); color: #fbbf24; }
.list-icon.type-card     { background: rgba(34,197,94,.11);  color: #86efac; }
.list-body { flex: 1; min-width: 0; }
.list-title { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-sub   { font-size: 12px; color: var(--text-2); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-arrow { color: var(--text-3); flex-shrink: 0; }
.list-arrow svg { width: 15px; height: 15px; }

/* ── Empty State ───────────────────────────────────────────── */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 80px 24px; gap: 10px; color: var(--text-3); text-align: center;
}
.empty-state svg { width: 44px; height: 44px; opacity: .3; margin-bottom: 6px; }
.empty-state p { font-size: 15px; }

/* ── Bank Card Thumbnail ───────────────────────────────────── */
.item-card {
  border-radius: var(--r-lg); cursor: pointer;
  transition: transform .2s, box-shadow .2s;
  animation: fadeUp .3s ease both; overflow: hidden;
}
.item-card:hover { transform: translateY(-3px); box-shadow: 0 14px 36px rgba(0,0,0,.5); }
.bank-card-visual {
  width: 100%; aspect-ratio: 1.586;
  border-radius: var(--r-lg); padding: 16px;
  position: relative; overflow: hidden;
  display: flex; flex-direction: column; justify-content: space-between;
}
.bank-card-visual::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.13) 0%, transparent 55%);
  pointer-events: none;
}
.card-chip svg { width: 26px; height: 20px; }
.card-number-display {
  font-size: 13px; font-weight: 600; letter-spacing: 2.5px;
  color: rgba(255,255,255,.88); font-variant-numeric: tabular-nums;
  text-shadow: 0 1px 6px rgba(0,0,0,.4);
}
.card-footer { display: flex; justify-content: space-between; align-items: flex-end; gap: 4px; }
.card-holder { font-size: 9px; text-transform: uppercase; letter-spacing: 1.3px; color: rgba(255,255,255,.7); }
.card-expiry-val { font-size: 11px; font-weight: 600; color: rgba(255,255,255,.85); margin-top: 1px; }
.card-bank-name { font-size: 12px; font-weight: 800; color: rgba(255,255,255,.9); letter-spacing: -.2px; text-align: right; max-width: 55%; word-break: break-all; }

/* ── FAB ───────────────────────────────────────────────────── */
.fab {
  position: fixed;
  right: 18px; bottom: calc(var(--tab-h) + 14px);
  width: 50px; height: 50px; border-radius: 13px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: #fff; border: none; cursor: pointer; z-index: 90;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 26px rgba(99,102,241,.5);
  transition: transform .2s, box-shadow .2s;
}
.fab:hover { transform: translateY(-2px) scale(1.05); box-shadow: 0 12px 34px rgba(99,102,241,.6); }
.fab:active { transform: scale(.93); }
.fab svg { width: 22px; height: 22px; }
@media (min-width: 640px) { .fab { bottom: 22px; } }

/* ── Mobile Tab Bar ────────────────────────────────────────── */
.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--tab-h);
  display: flex;
  background: rgba(11,11,24,.92);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.tab-bar-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  border: none; background: transparent; color: var(--text-3);
  font-family: 'Figtree', sans-serif; font-size: 10px; font-weight: 500;
  cursor: pointer; padding: 8px 2px;
  transition: color .18s; -webkit-tap-highlight-color: transparent;
}
.tab-bar-item svg { width: 21px; height: 21px; }
.tab-bar-item.active { color: var(--accent); }

/* ── Full-Screen Modals ────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 200;
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  animation: fadeIn .18s ease;
}

/* Modal Topbar */
.modal-topbar {
  position: sticky; top: 0; z-index: 10;
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  background: rgba(11,11,24,.92);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.modal-topbar-title {
  flex: 1; font-size: 16px; font-weight: 700;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.modal-topbar-actions { display: flex; gap: 6px; align-items: center; }
.close-btn {
  width: 34px; height: 34px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--border); border-radius: var(--r);
  background: rgba(255,255,255,.06); color: var(--text-2); cursor: pointer;
  transition: background .15s, color .15s;
}
.close-btn:hover { background: rgba(255,255,255,.12); color: var(--text); }
.close-btn svg { width: 16px; height: 16px; }

/* Modal Body */
.modal-body {
  max-width: 640px; margin: 0 auto;
  padding: 18px 16px 48px;
}
@media (min-width: 640px) { .modal-body { padding: 24px 28px 56px; } }

/* ── View Modal ────────────────────────────────────────────── */
.bank-card-large {
  width: 100%; max-width: 380px;
  aspect-ratio: 1.586; border-radius: var(--r-lg);
  padding: 22px 22px; margin-bottom: 18px;
  position: relative; overflow: hidden;
  display: flex; flex-direction: column; justify-content: space-between;
}
.bank-card-large::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.15) 0%, transparent 55%);
}
.bank-card-large .card-chip svg { width: 32px; height: 26px; }
.bank-card-large .card-number-display { font-size: 18px; letter-spacing: 3.5px; }
.bank-card-large .card-bank-name { font-size: 16px; }
.bank-card-large .card-holder { font-size: 10px; }
.bank-card-large .card-expiry-val { font-size: 13px; }

.fields-list { display: flex; flex-direction: column; gap: 7px; }
.field-row {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 13px;
  background: rgba(255,255,255,.04); border: 1px solid var(--border);
  border-radius: var(--r);
}
.field-info { flex: 1; min-width: 0; }
.field-label { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 3px; }
.field-value { font-size: 15px; color: var(--text); word-break: break-all; }
.field-value.mono { font-family: 'SF Mono','Fira Code',monospace; letter-spacing: 1.5px; }
.field-value.secret { letter-spacing: 3px; color: var(--text-2); }
.modal-view-footer { display: flex; gap: 8px; margin-top: 18px; justify-content: flex-end; }
.view-modal-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* ── Edit Modal ────────────────────────────────────────────── */
.type-tabs { display: flex; gap: 5px; margin-bottom: 18px; flex-wrap: wrap; }
.type-tab {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 13px; border-radius: var(--r); border: 1px solid var(--border);
  background: var(--glass-2); color: var(--text-2);
  font-family: 'Figtree', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all .18s;
}
.type-tab svg { width: 13px; height: 13px; }
.type-tab:hover { background: var(--glass); color: var(--text); }
.type-tab.active { background: rgba(99,102,241,.18); border-color: rgba(99,102,241,.4); color: var(--text); }

.edit-field { margin-bottom: 13px; }
.edit-field label { display: block; font-size: 11px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 7px; }
.edit-field input, .edit-field select, .edit-field textarea {
  width: 100%; background: rgba(255,255,255,.05); border: 1px solid var(--border);
  border-radius: var(--r); padding: 11px 13px;
  color: var(--text); font-family: 'Figtree', sans-serif; font-size: 15px; outline: none;
  transition: border-color .2s, background .2s;
}
.edit-field input:focus, .edit-field select:focus, .edit-field textarea:focus {
  border-color: rgba(99,102,241,.6); background: rgba(255,255,255,.08);
}
.edit-field input::placeholder, .edit-field textarea::placeholder { color: var(--text-3); }
.edit-field select option { background: #1a1a2e; }
.edit-field textarea { resize: vertical; min-height: 80px; }
.edit-field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.color-picker { display: flex; gap: 7px; flex-wrap: wrap; }
.color-dot {
  width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: transform .15s, border-color .15s;
}
.color-dot:hover { transform: scale(1.12); }
.color-dot.selected { border-color: rgba(255,255,255,.85); transform: scale(1.18); }
.divider { height: 1px; background: var(--border); margin: 14px 0; }

/* ── Animations ────────────────────────────────────────────── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.stagger { animation-delay: calc(var(--i, 0) * 45ms); }

/* ── Responsive ────────────────────────────────────────────── */
@media (min-width: 640px) {
  .tab-bar { display: none; }
  .section-tabs { display: flex; }
  .vault-content { padding-bottom: 40px; }
  .fab { right: 24px; }
}
@media (max-width: 639px) {
  .section-tabs { display: none; }
  .vault-content { padding-bottom: calc(var(--tab-h) + 20px); }
}
</style>
</head>
<body>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-orb orb3"></div>

<!-- ══ Login Screen ══════════════════════════════════════════ -->
<div id="login-screen" class="screen hidden">
  <div class="login-card">
    <img src="logo.png" alt="Vault Logo" class="login-logo">
    <h1>Vault</h1>
    <p class="sub">Личное зашифрованное хранилище</p>
    <div id="login-error" class="error-msg hidden"></div>
    <div class="form-group">
      <label>Логин</label>
      <input type="text" id="login-username" autocomplete="username" placeholder="ваш логин">
    </div>
    <div class="form-group">
      <label>Пароль</label>
      <input type="password" id="login-password" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button class="btn btn-primary btn-full" id="login-btn">Войти</button>
  </div>
</div>

<!-- ══ Vault Screen ══════════════════════════════════════════ -->
<div id="vault-screen" class="screen hidden">

  <!-- Search bar -->
  <div class="vault-search-bar">
    <div class="search-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="search" id="search-input" placeholder="Поиск..." autocomplete="off">
    </div>
    <button class="btn-logout" id="logout-btn" title="Выйти">

<script>
// ══════════════════════════════════════════════════════════════
//  SVG Icon Helper
// ══════════════════════════════════════════════════════════════
const ICONS = {
  'credit-card': '<rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/>',
  'file-text':   '<path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/>',
  'key':         '<circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/>',
  'note':        '<path d="M16 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8Z"/><path d="M15 3v4a2 2 0 0 0 2 2h4"/>',
  'eye':         '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>',
  'eye-off':     '<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/>',
  'copy':        '<rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>',
  'check':       '<path d="M20 6 9 17l-5-5"/>',
  'chevron-r':   '<path d="m9 18 6-6-6-6"/>',
  'chip':        '<rect x="3" y="4" width="18" height="16" rx="3" fill="rgba(255,215,0,.85)" stroke="rgba(180,140,0,.4)" stroke-width="1"/><rect x="3" y="10" width="18" height="4" fill="rgba(160,120,0,.3)"/><rect x="8" y="4" width="2.5" height="16" fill="rgba(160,120,0,.2)"/><rect x="13.5" y="4" width="2.5" height="16" fill="rgba(160,120,0,.2)"/>',
};

function icon(name, w=24, h=24) {
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]||''}</svg>`;
}
function iconFill(name, w=24, h=24) {
  // For chip - no stroke needed
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 24 24">${ICONS[name]||''}</svg>`;
}

// ══════════════════════════════════════════════════════════════
//  State
// ══════════════════════════════════════════════════════════════
const S = {
  items:    [],
  filter:   'card',
  search:   '',
  editType: 'card',
  editId:   null,
};

// ── Card color presets ─────────────────────────────────────
const CARD_COLORS = [
  { id:'midnight', g:'linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)' },
  { id:'indigo',   g:'linear-gradient(135deg,#4338ca,#7c3aed)' },
  { id:'rose',     g:'linear-gradient(135deg,#be185d,#f43f5e)' },
  { id:'ocean',    g:'linear-gradient(135deg,#0369a1,#0891b2)' },
  { id:'emerald',  g:'linear-gradient(135deg,#065f46,#059669)' },
  { id:'gold',     g:'linear-gradient(135deg,#92400e,#d97706)' },
  { id:'carbon',   g:'linear-gradient(135deg,#18181b,#3f3f46)' },
  { id:'aurora',   g:'linear-gradient(135deg,#4a044e,#7e22ce,#1e3a5f)' },
  { id:'sunset',   g:'linear-gradient(135deg,#7c2d12,#ea580c,#fbbf24)' },
  { id:'arctic',   g:'linear-gradient(135deg,#0c4a6e,#0284c7,#38bdf8)' },
  { id:'cherry',   g:'linear-gradient(135deg,#881337,#e11d48,#fb7185)' },
  { id:'forest',   g:'linear-gradient(135deg,#14532d,#16a34a)' },
  { id:'space',    g:'linear-gradient(135deg,#0f0f23,#1e1b4b,#312e81)' },
  { id:'copper',   g:'linear-gradient(135deg,#78350f,#b45309,#fcd34d)' },
  { id:'violet',   g:'linear-gradient(135deg,#3b0764,#7c3aed,#a855f7)' },
  { id:'slate',    g:'linear-gradient(135deg,#0f172a,#334155,#64748b)' },
];
let selectedColor = CARD_COLORS[0].id;

const DOC_TYPES = ['Паспорт','ID карта','Водительские права','Загранпаспорт','Медицинский полис','ИНН','Другое'];

// ══════════════════════════════════════════════════════════════
//  API
// ══════════════════════════════════════════════════════════════
async function api(action, method='GET', body=null, id=null) {
  const url = `api.php?action=${action}${id ? '&id='+id : ''}`;
  const opts = { method, headers:{'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  return r.json();
}

// ══════════════════════════════════════════════════════════════
//  Auth
// ══════════════════════════════════════════════════════════════
async function init() {
  const r = await api('check');
  if (r.authenticated) showVault();
  else showLogin();
}

async function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.classList.add('hidden');
  if (!username || !password) { errEl.textContent='Заполни оба поля'; errEl.classList.remove('hidden'); return; }
  const btn = document.getElementById('login-btn');
  btn.textContent = 'Вход...'; btn.disabled = true;
  const r = await api('login','POST',{username,password});
  btn.textContent = 'Войти'; btn.disabled = false;
  if (r.ok) showVault();
  else { errEl.textContent = r.error || 'Ошибка'; errEl.classList.remove('hidden'); }
}

async function doLogout() {
  await api('logout','POST');
  showLogin();
}

// ══════════════════════════════════════════════════════════════
//  Items
// ══════════════════════════════════════════════════════════════
async function loadItems() {
  const r = await api('items');
  S.items = r.items || [];
  renderGrid();
}

async function loadItemDetail(id) {
  const r = await api('item','GET',null,id);
  return r.item;
}

async function saveItem() {
  const errEl = document.getElementById('edit-error');
  errEl.classList.add('hidden');
  const title = document.getElementById('ef-title').value.trim();
  if (!title) { errEl.textContent='Введи название'; errEl.classList.remove('hidden'); return; }
  const type  = S.editType;
  const data  = collectFormData(type);
  const color = (type === 'card') ? selectedColor : null;
  const btn   = document.getElementById('edit-save-btn');
  btn.textContent = '...'; btn.disabled = true;
  let r;
  if (S.editId) r = await api('item','PUT',{type,title,data,color},S.editId);
  else          r = await api('items','POST',{type,title,data,color});
  btn.textContent = 'Сохранить'; btn.disabled = false;
  if (r.ok) { closeEdit(); await loadItems(); }
  else { errEl.textContent = r.error || 'Ошибка сохранения'; errEl.classList.remove('hidden'); }
}

async function deleteItem(id) {
  if (!confirm('Удалить эту запись?')) return;
  await api('item','DELETE',null,id);
  closeView();
  await loadItems();
}

// ══════════════════════════════════════════════════════════════
//  Screens
// ══════════════════════════════════════════════════════════════
function showLogin() {
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('vault-screen').classList.add('hidden');
  document.getElementById('login-username').focus();
}
async function showVault() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('vault-screen').classList.remove('hidden');
  await loadItems();
}

// ══════════════════════════════════════════════════════════════
//  Tab Switching
// ══════════════════════════════════════════════════════════════
function setFilter(f) {
  S.filter = f;
  // Mobile tab bar
  document.querySelectorAll('.tab-bar-item').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  // Desktop tabs
  document.querySelectorAll('.section-tab').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  renderGrid();
}

// ══════════════════════════════════════════════════════════════
//  Grid / List Rendering
// ══════════════════════════════════════════════════════════════
function renderGrid() {
  const grid = document.getElementById('vault-grid');
  let items = S.items.filter(i => i.type === S.filter);
  if (S.search) {
    const q = S.search.toLowerCase();
    items = items.filter(i => i.title.toLowerCase().includes(q));
  }

  if (!items.length) {
    const emptyIcons = { card:'credit-card', document:'file-text', login:'key', note:'note' };
    grid.innerHTML = `<div class="empty-state">${icon(emptyIcons[S.filter]||'note',44,44)}<p>Нет записей. Нажми&nbsp;+&nbsp;чтобы добавить!</p></div>`;
    return;
  }

  if (S.filter === 'card') {
    grid.innerHTML = `<div class="cards-grid">${items.map((it,i) => renderBankCard(it,i)).join('')}</div>`;
  } else {
    grid.innerHTML = `<div class="items-list">${items.map((it,i) => renderListItem(it,i)).join('')}</div>`;
  }

  grid.querySelectorAll('[data-id]').forEach(el => {
    el.addEventListener('click', () => openView(+el.dataset.id));
  });
}

function renderBankCard(item, idx) {
  const col = CARD_COLORS.find(c => c.id === item.color) || CARD_COLORS[0];
  const p   = item.preview || {};
  const masked = p.last4 || '•••• •••• •••• ••••';
  return `
  <div class="item-card stagger" data-id="${item.id}" style="--i:${idx}">
    <div class="bank-card-visual" style="background:${col.g}">
      <div class="card-chip">${iconFill('chip',26,20)}</div>
      <div class="card-number-display">${masked}</div>
      <div class="card-footer">
        <div>
          <div class="card-holder">${esc(item.title)}</div>
          <div class="card-expiry-val">${esc(p.expiry||'')}</div>
        </div>
        <div class="card-bank-name">${esc(p.bank||'')}</div>
      </div>
    </div>
  </div>`;
}

function renderListItem(item, idx) {
  const typeIcon = { document:'file-text', login:'key', note:'note' };
  const subtitles = {
    document: item.preview?.doc_type || 'Документ',
    login:    item.preview?.username || item.preview?.url || 'Пароль',
    note:     item.preview?.snippet  || 'Заметка',
  };
  return `
  <div class="list-item stagger" data-id="${item.id}" style="--i:${idx}">
    <div class="list-icon type-${item.type}">${icon(typeIcon[item.type]||'note',18,18)}</div>
    <div class="list-body">
      <div class="list-title">${esc(item.title)}</div>
      <div class="list-sub">${esc(subtitles[item.type]||'')}</div>
    </div>
    <div class="list-arrow">${icon('chevron-r',16,16)}</div>
  </div>`;
}

// ══════════════════════════════════════════════════════════════
//  View Modal
// ══════════════════════════════════════════════════════════════
async function openView(id) {
  const item = await loadItemDetail(id);
  if (!item) return;
  const overlay = document.getElementById('view-overlay');
  document.getElementById('view-modal-topbar-title').textContent = item.title;
  document.getElementById('view-modal-content').innerHTML = buildViewContent(item);
  overlay.classList.remove('hidden');
  overlay.scrollTop = 0;

  document.getElementById('view-edit-btn').onclick   = () => { closeView(); openEdit(item); };
  document.getElementById('view-delete-btn').onclick = () => deleteItem(item.id);
  document.getElementById('view-close-btn').onclick  = closeView;

  overlay.querySelectorAll('.copy-field-btn').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); copyText(btn.dataset.value, btn); });
  });
}

function buildViewContent(item) {
  const d   = item.data || {};
  const col = CARD_COLORS.find(c => c.id === item.color);
  const typeLabels = { card:'Банковская карта', document:'Документ', login:'Пароль / Логин', note:'Заметка' };
  let body = '';

  if (item.type === 'card') {
    const num = (d.card_number || '').replace(/(.{4})/g, '$1 ').trim();
    const cardStyle = col ? `background:${col.g}` : 'background:linear-gradient(135deg,#1a1a2e,#0f3460)';
    body = `
    <div class="bank-card-large" style="${cardStyle}">
      <div class="card-chip">${iconFill('chip',32,26)}</div>
      <div class="card-number-display">${num || '•••• •••• •••• ••••'}</div>
      <div class="card-footer">
        <div>
          <div class="card-holder">${esc(d.cardholder||'')}</div>
          <div class="card-expiry-val">${esc(d.expiry||'')}</div>
        </div>
        <div class="card-bank-name">${esc(d.bank||item.title)}</div>
      </div>
    </div>
    <div class="fields-list">
      ${fieldRow('Банк',d.bank||item.title)}
      ${fieldRow('Номер карты',num,true,true)}
      ${fieldRow('Владелец',d.cardholder||'')}
      ${fieldRow('Срок',d.expiry||'')}
      ${fieldRow('CVV',d.cvv||'',false,false,true)}
      ${d.notes ? fieldRow('Заметка',d.notes) : ''}
    </div>`;
  } else if (item.type === 'document') {
    body = `<div class="fields-list">
      ${fieldRow('Тип',d.doc_type||'')}
      ${fieldRow('Номер',d.doc_number||'',true)}
      ${d.name       ? fieldRow('Имя',d.name) : ''}
      ${d.issued_by  ? fieldRow('Кем выдан',d.issued_by) : ''}
      ${d.issue_date ? fieldRow('Дата выдачи',d.issue_date) : ''}
      ${d.expiry     ? fieldRow('Срок действия',d.expiry) : ''}
      ${d.notes      ? fieldRow('Заметка',d.notes) : ''}
    </div>`;
  } else if (item.type === 'login') {
    body = `<div class="fields-list">
      ${d.url      ? fieldRow('Сайт',d.url,true) : ''}
      ${fieldRow('Логин / Email',d.username||'',true)}
      ${fieldRow('Пароль',d.password||'',true,false,true)}
      ${d.notes    ? fieldRow('Заметка',d.notes) : ''}
    </div>`;
  } else {
    body = `<div class="fields-list">${fieldRow('Содержимое',d.content||'')}</div>`;
  }

  return body;
}

function fieldRow(label, value, copyable=false, mono=false, secret=false) {
  if (!value) return '';
  const cls = mono ? 'mono' : secret ? 'secret' : '';
  const display = secret ? '••••••••' : esc(value);
  const uid = Math.random().toString(36).slice(2);
  const showToggle = secret
    ? `<button class="btn-icon" onclick="toggleSecret(this,'${esc(value).replace(/'/g,"\\'")}')">
        ${icon('eye',14,14)}
       </button>` : '';
  const copyBtn = (copyable || secret)
    ? `<button class="btn-icon copy-field-btn" data-value="${esc(value)}" title="Копировать">
        ${icon('copy',14,14)}
       </button>` : '';
  return `
  <div class="field-row">
    <div class="field-info">
      <div class="field-label">${esc(label)}</div>
      <div class="field-value ${cls}" id="fv-${uid}">${display}</div>
    </div>
    ${showToggle}${copyBtn}
  </div>`;
}

function toggleSecret(btn, value) {
  const fv = btn.closest('.field-row').querySelector('.field-value');
  if (fv.dataset.shown === '1') {
    fv.innerHTML = '••••••••'; fv.dataset.shown='0';
    btn.innerHTML = icon('eye',14,14);
  } else {
    fv.textContent = value; fv.dataset.shown='1';
    btn.innerHTML = icon('eye-off',14,14);
  }
}
window.toggleSecret = toggleSecret;

function closeView() {
  document.getElementById('view-overlay').classList.add('hidden');
}

// ══════════════════════════════════════════════════════════════
//  Edit Modal
// ══════════════════════════════════════════════════════════════
function openAdd() {
  S.editId   = null;
  S.editType = S.filter !== 'all' ? S.filter : 'card';
  selectedColor = CARD_COLORS[0].id;
  document.getElementById('edit-modal-title').textContent = 'Добавить запись';
  document.getElementById('ef-title').value = '';
  document.getElementById('edit-error').classList.add('hidden');
  setActiveTypeTab(S.editType);
  renderDynamicFields(S.editType, {});
  const overlay = document.getElementById('edit-overlay');
  overlay.classList.remove('hidden');
  overlay.scrollTop = 0;
  setTimeout(() => document.getElementById('ef-title').focus(), 80);
}

function openEdit(item) {
  S.editId   = item.id;
  S.editType = item.type;
  selectedColor = item.color || CARD_COLORS[0].id;
  document.getElementById('edit-modal-title').textContent = 'Редактировать';
  document.getElementById('ef-title').value = item.title;
  document.getElementById('edit-error').classList.add('hidden');
  setActiveTypeTab(item.type);
  renderDynamicFields(item.type, item.data || {});
  const overlay = document.getElementById('edit-overlay');
  overlay.classList.remove('hidden');
  overlay.scrollTop = 0;
}

function closeEdit() {
  document.getElementById('edit-overlay').classList.add('hidden');
}

function setActiveTypeTab(type) {
  document.querySelectorAll('.type-tab').forEach(t => t.classList.toggle('active', t.dataset.type === type));
}

function renderDynamicFields(type, data) {
  const container = document.getElementById('dynamic-fields');
  let html = '';

  if (type === 'card') {
    html = `
    <div class="edit-field-row">
      <div class="edit-field"><label>Банк</label><input id="ef-bank" placeholder="Kapital Bank, ABB..." value="${esc(data.bank||'')}"></div>
      <div class="edit-field"><label>Владелец</label><input id="ef-cardholder" placeholder="FAIK ALIYEV" value="${esc(data.cardholder||'')}"></div>
    </div>
    <div class="edit-field"><label>Номер карты</label><input id="ef-card-number" placeholder="0000 0000 0000 0000" maxlength="19" value="${esc(data.card_number||'')}"></div>
    <div class="edit-field-row">
      <div class="edit-field"><label>Срок (MM/YY)</label><input id="ef-expiry" placeholder="12/28" maxlength="5" value="${esc(data.expiry||'')}"></div>
      <div class="edit-field"><label>CVV</label><input id="ef-cvv" placeholder="•••" maxlength="4" type="password" value="${esc(data.cvv||'')}"></div>
    </div>
    <div class="divider"></div>
    <div class="edit-field">
      <label>Цвет карты</label>
      <div class="color-picker" id="color-picker">
        ${CARD_COLORS.map(c=>`<div class="color-dot${c.id===selectedColor?' selected':''}" data-id="${c.id}" style="background:${c.g}" title="${c.id}"></div>`).join('')}
      </div>
    </div>
    <div class="edit-field"><label>Заметка</label><textarea id="ef-notes" placeholder="Необязательно">${esc(data.notes||'')}</textarea></div>`;
  } else if (type === 'document') {
    html = `
    <div class="edit-field"><label>Тип документа</label>
      <select id="ef-doc-type">${DOC_TYPES.map(t=>`<option${data.doc_type===t?' selected':''}>${t}</option>`).join('')}</select>
    </div>
    <div class="edit-field"><label>Номер документа</label><input id="ef-doc-number" placeholder="AA1234567" value="${esc(data.doc_number||'')}"></div>
    <div class="edit-field"><label>Имя (как в документе)</label><input id="ef-name" placeholder="FAIK ALIYEV" value="${esc(data.name||'')}"></div>
    <div class="edit-field-row">
      <div class="edit-field"><label>Дата выдачи</label><input id="ef-issue-date" type="date" value="${esc(data.issue_date||'')}"></div>
      <div class="edit-field"><label>Срок действия</label><input id="ef-expiry" type="date" value="${esc(data.expiry||'')}"></div>
    </div>
    <div class="edit-field"><label>Кем выдан</label><input id="ef-issued-by" placeholder="МВД Азербайджана" value="${esc(data.issued_by||'')}"></div>
    <div class="edit-field"><label>Заметка</label><textarea id="ef-notes" placeholder="Необязательно">${esc(data.notes||'')}</textarea></div>`;
  } else if (type === 'login') {
    html = `
    <div class="edit-field"><label>Сайт / Приложение</label><input id="ef-url" placeholder="https://example.com" type="url" value="${esc(data.url||'')}"></div>
    <div class="edit-field"><label>Логин / Email</label><input id="ef-username" placeholder="user@email.com" autocomplete="off" value="${esc(data.username||'')}"></div>
    <div class="edit-field"><label>Пароль</label><input id="ef-password" type="password" placeholder="••••••••" autocomplete="new-password" value="${esc(data.password||'')}"></div>
    <div class="edit-field"><label>Заметка</label><textarea id="ef-notes" placeholder="Необязательно">${esc(data.notes||'')}</textarea></div>`;
  } else {
    html = `
    <div class="edit-field"><label>Содержимое</label><textarea id="ef-content" placeholder="Текст заметки..." style="min-height:130px">${esc(data.content||'')}</textarea></div>`;
  }

  container.innerHTML = html;

  // Color picker
  container.querySelectorAll('.color-dot').forEach(dot => {
    dot.addEventListener('click', () => {
      container.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
      dot.classList.add('selected');
      selectedColor = dot.dataset.id;
    });
  });

  // Card number formatting
  const cardNumInput = container.querySelector('#ef-card-number');
  if (cardNumInput) {
    cardNumInput.addEventListener('input', function() {
      let v = this.value.replace(/\D/g,'').slice(0,16);
      this.value = v.match(/.{1,4}/g)?.join(' ') || v;
    });
  }

  // Expiry MM/YY
  const expiryInput = container.querySelector('#ef-expiry[maxlength="5"]');
  if (expiryInput) {
    expiryInput.addEventListener('input', function() {
      let v = this.value.replace(/\D/g,'');
      if (v.length >= 2) v = v.slice(0,2) + '/' + v.slice(2,4);
      this.value = v;
    });
  }
}

function collectFormData(type) {
  const g = id => document.getElementById(id)?.value?.trim() || '';
  if (type==='card')     return { bank:g('ef-bank'), cardholder:g('ef-cardholder'), card_number:g('ef-card-number').replace(/\s/g,''), expiry:g('ef-expiry'), cvv:g('ef-cvv'), notes:g('ef-notes') };
  if (type==='document') return { doc_type:g('ef-doc-type'), doc_number:g('ef-doc-number'), name:g('ef-name'), issue_date:g('ef-issue-date'), expiry:g('ef-expiry'), issued_by:g('ef-issued-by'), notes:g('ef-notes') };
  if (type==='login')    return { url:g('ef-url'), username:g('ef-username'), password:g('ef-password'), notes:g('ef-notes') };
  return { content:g('ef-content') };
}

// ══════════════════════════════════════════════════════════════
//  Copy
// ══════════════════════════════════════════════════════════════
async function copyText(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
    const orig = btn.innerHTML;
    btn.innerHTML = icon('check',14,14);
    btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 2000);
  } catch {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  }
}

// ══════════════════════════════════════════════════════════════
//  Utilities
// ══════════════════════════════════════════════════════════════
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ══════════════════════════════════════════════════════════════
//  Event Wiring
// ══════════════════════════════════════════════════════════════
document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('login-password').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('logout-btn').addEventListener('click', doLogout);
document.getElementById('add-btn').addEventListener('click', openAdd);
document.getElementById('edit-cancel-btn').addEventListener('click', closeEdit);
document.getElementById('edit-save-btn').addEventListener('click', saveItem);

// Mobile tab bar
document.getElementById('tab-bar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-bar-item');
  if (!btn) return;
  setFilter(btn.dataset.filter);
});

// Desktop section tabs
document.getElementById('section-tabs').addEventListener('click', e => {
  const btn = e.target.closest('.section-tab');
  if (!btn) return;
  setFilter(btn.dataset.filter);
});

// Type tabs in edit modal
document.getElementById('type-tabs').addEventListener('click', e => {
  const tab = e.target.closest('.type-tab');
  if (!tab || S.editId) return;
  setActiveTypeTab(tab.dataset.type);
  S.editType = tab.dataset.type;
  renderDynamicFields(tab.dataset.type, {});
});

// Search
document.getElementById('search-input').addEventListener('input', e => {
  S.search = e.target.value;
  renderGrid();
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeView(); closeEdit(); }
});

// ── Go! ────────────────────────────────────────────────────
init();

// ── Service Worker ─────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
